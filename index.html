<title>xxx</title>

<style>
body {
    background-color: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

.box {
    background: #222;
    padding: 20px;
    margin: 50px auto;
    width: 300px;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>idiot</h1>



<p>City: <span id="city">Loading...</span></p>
<p>Country: <span id="country">Loading...</span></p>
<p>Browser: <span id="browser"></span></p>
<p>Device: <span id="device"></span></p>
<p>Language: <span id="language"></span></p>
<p>Screen: <span id="screen"></span></p>
<p>Time Zone: <span id="timezone"></span></p>

<button onclick="alert('meow')">
Click Me
</button>

</div>


<script>

// Device information
document.getElementById("browser").textContent = navigator.userAgent;
document.getElementById("device").textContent = navigator.platform;
document.getElementById("language").textContent = navigator.language;
document.getElementById("screen").textContent =
screen.width + "x" + screen.height;
document.getElementById("timezone").textContent =
Intl.DateTimeFormat().resolvedOptions().timeZone;


// Location information
fetch("https://ipapi.co/json/")
.then(response => response.json())
.then(data => {

document.getElementById("city").textContent =
data.city || "Unknown";

document.getElementById("country").textContent =
data.country_name || "Unknown";

})
.catch(() => {

document.getElementById("city").textContent = "Unavailable";
document.getElementById("country").textContent = "Unavailable";

});

</script>

</body>
</html>
